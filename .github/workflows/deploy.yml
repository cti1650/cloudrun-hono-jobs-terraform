name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      target:
        description: "デプロイ対象"
        required: true
        type: choice
        options:
          - all
          - app
          - job

env:
  PREFIX: ${{ vars.PREFIX }}
  REGION: asia-northeast1
  REPOSITORY_NAME: cloud-run-apps
  APP_IMAGE_NAME: hono-api
  JOB_IMAGE_NAME: cloud-run-job

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Extract project ID from credentials
        run: echo "PROJECT_ID=$(echo '${{ secrets.GCP_SA_KEY }}' | jq -r .project_id)" >> "$GITHUB_ENV"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Apply registry
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -target=google_project_service.artifactregistry \
            -target=google_project_service.cloudbuild \
            -target=google_artifact_registry_repository.app \
            -target=google_project_iam_member.cloudbuild_artifact_writer
        env:
          TF_VAR_prefix: ${{ env.PREFIX }}
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_repository_name: ${{ env.REPOSITORY_NAME }}
          TF_VAR_app_image_name: ${{ env.APP_IMAGE_NAME }}
          TF_VAR_job_image_name: ${{ env.JOB_IMAGE_NAME }}

      - name: Build & push API image
        if: inputs.target == 'all' || inputs.target == 'app'
        working-directory: app
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${PREFIX}-${REPOSITORY_NAME}/${APP_IMAGE_NAME}:latest"
          gcloud builds submit --project="${PROJECT_ID}" --tag "${IMAGE}"

      - name: Build & push Job image
        if: inputs.target == 'all' || inputs.target == 'job'
        working-directory: jobs
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${PREFIX}-${REPOSITORY_NAME}/${JOB_IMAGE_NAME}:latest"
          gcloud builds submit --project="${PROJECT_ID}" --tag "${IMAGE}"

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_prefix: ${{ env.PREFIX }}
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_repository_name: ${{ env.REPOSITORY_NAME }}
          TF_VAR_app_image_name: ${{ env.APP_IMAGE_NAME }}
          TF_VAR_job_image_name: ${{ env.JOB_IMAGE_NAME }}
